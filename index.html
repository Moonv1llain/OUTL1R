<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUTL1R</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --text: #f5f5f5;
  --text2: #888;
  --text3: #444;
  --red: #ff2a2a;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  padding: 0 40px; height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.4s, border-color 0.4s;
  border-bottom: 1px solid transparent;
}
nav.solid { 
  background: rgba(10,10,10,0.95); 
  border-bottom-color: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: .08em; color: var(--text);
  text-decoration: none; line-height: 1;
}
.nav-logo span { color: var(--red); }
.nav-right { display: flex; gap: 32px; align-items: center; }
.nav-link {
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text); text-decoration: none; cursor: pointer;
  transition: opacity 0.2s; background: none; border: none;
  font-family: 'Inter', sans-serif; font-weight: 400;
  opacity: 0.5;
}
.nav-link:hover { opacity: 1; }

/* HERO - CLEAN DARK */
.hero {
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  padding: 0 8vw;
  position: relative; overflow: hidden;
  background: var(--bg);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 120px 120px;
  opacity: 0.4;
  pointer-events: none;
}
.hero-eyebrow {
  font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
  color: var(--red); margin-bottom: 32px;
  font-weight: 500;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 16vw, 200px);
  font-weight: 400; line-height: 0.85; color: var(--text);
  letter-spacing: -0.01em;
  position: relative; z-index: 1;
  text-transform: uppercase;
}
.hero-title-line {
  display: block;
  overflow: hidden;
}
.hero-title-line span {
  display: block;
  transform: translateY(100%);
  animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.hero-title-line:nth-child(1) span { animation-delay: 0.1s; }
.hero-title-line:nth-child(2) span { animation-delay: 0.2s; }
.hero-title-line:nth-child(3) span { animation-delay: 0.3s; }
@keyframes reveal {
  to { transform: translateY(0); }
}
.hero-title em {
  font-style: normal;
  color: var(--text2);
}
.hero-sub {
  font-size: 13px; color: var(--text2);
  letter-spacing: .01em; line-height: 1.7;
  max-width: 340px;
  margin-top: 56px;
  position: relative; z-index: 1;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.6s forwards;
}
.hero-meta {
  position: absolute; bottom: 60px; left: 8vw;
  display: flex; gap: 48px;
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text3);
  opacity: 0;
  animation: fadeIn 1.4s ease 0.8s forwards;
}
.hero-meta span { color: var(--text2); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOOD BAR */
.mood-bar {
  position: sticky; top: 70px; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 0 8vw;
  display: flex; align-items: center; gap: 4px;
  overflow-x: auto; scrollbar-width: none;
}
.mood-bar::-webkit-scrollbar { display: none; }
.mb-item {
  padding: 22px 18px; white-space: nowrap;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); cursor: pointer;
  transition: color 0.2s;
  border: none; background: none;
  font-family: 'Inter', sans-serif; font-weight: 400;
  position: relative;
}
.mb-item::after {
  content: '';
  position: absolute; bottom: 16px; left: 18px; right: 18px;
  height: 1px;
  background: var(--red);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}
.mb-item:hover { color: var(--text2); }
.mb-item.on { color: var(--text); }
.mb-item.on::after { transform: scaleX(1); }

/* FEED */
.feed {
  max-width: 720px; margin: 0 auto;
  padding: 120px 32px 160px;
}

/* QUOTE BLOCK */
.quote-block {
  padding: 80px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.quote-block.vis { opacity: 1; transform: translateY(0); }
.quote-block:last-child { border-bottom: none; }

.qb-mood {
  font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
  color: var(--red); margin-bottom: 32px;
  font-weight: 500;
  display: flex; align-items: center; gap: 12px;
}
.qb-mood::before {
  content: '';
  width: 20px; height: 1px;
  background: var(--red);
}
.qb-text {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.08; color: var(--text);
  white-space: pre-line; letter-spacing: 0.02em;
  text-transform: uppercase;
  cursor: pointer; 
  transition: opacity 0.2s;
}
.quote-block:hover .qb-text { opacity: 0.75; }

/* size variants */
.quote-block.size-lg .qb-text { font-size: clamp(42px, 7vw, 72px); }
.quote-block.size-sm .qb-text { 
  font-size: clamp(24px, 3.5vw, 32px); 
  color: var(--text2);
  letter-spacing: 0.05em;
}
.quote-block.size-sm .qb-text:hover { color: var(--text); opacity: 1; }

/* featured */
.quote-block.size-featured {
  padding: 120px 0; text-align: center;
}
.quote-block.size-featured .qb-mood { justify-content: center; }
.quote-block.size-featured .qb-mood::before { display: none; }
.quote-block.size-featured .qb-text { 
  font-size: clamp(48px, 8vw, 88px); 
  line-height: 1.05;
}
.quote-block.size-featured .qb-divider { margin: 40px auto; }
.quote-block.size-featured .qb-meta { justify-content: center; }

.qb-divider {
  width: 1px; height: 32px;
  background: rgba(255,255,255,0.08);
  margin: 32px 0;
}
.qb-meta { 
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 28px;
}
.qb-actions { display: flex; gap: 16px; align-items: center; }
.qb-like-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text3); font-family: 'Inter', sans-serif;
  transition: color 0.15s; padding: 0;
}
.qb-like-btn:hover { color: var(--text); }
.qb-like-btn.liked { color: var(--red); }
.qb-like-btn .heart { font-size: 14px; }
.qb-copy-btn {
  background: none; border: 1px solid rgba(255,255,255,0.08); 
  padding: 6px 14px; 
  font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--text3); cursor: pointer; font-family: 'Inter', sans-serif;
  transition: all 0.15s;
}
.qb-copy-btn:hover { border-color: var(--text2); color: var(--text); }

/* THOUGHT BLOCK */
.thought-block {
  padding: 60px 0 60px 30px; 
  border-bottom: 1px solid rgba(255,255,255,0.04);
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
  position: relative;
}
.thought-block.vis { opacity: 1; transform: translateY(0); }
.thought-block::before {
  content: '';
  position: absolute; left: 0; top: 60px; bottom: 60px;
  width: 2px;
  background: var(--red);
  opacity: 0.25;
}
.thought-text {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 14px; color: var(--text2);
  line-height: 1.8; letter-spacing: .02em;
  font-style: italic;
}

/* MID-FEED CTA */
.feed-cta {
  padding: 100px 0; text-align: center; 
  border-bottom: 1px solid rgba(255,255,255,0.04);
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.feed-cta.vis { opacity: 1; transform: translateY(0); }
.feed-cta-eyebrow {
  font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--red); margin-bottom: 20px; font-weight: 500;
}
.feed-cta-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px, 4vw, 42px);
  font-weight: 400;
  color: var(--text2); line-height: 1.2; margin-bottom: 32px;
  text-transform: uppercase; letter-spacing: 0.02em;
}
.feed-cta-link {
  display: inline-block; padding: 12px 28px;
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text2); text-decoration: none; transition: all 0.2s;
  font-weight: 400;
}
.feed-cta-link:hover { 
  border-color: var(--text); 
  color: var(--text); 
  background: rgba(255,255,255,0.02);
}

/* FULLSCREEN */
.fullscreen {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(10,10,10,0.98);
  align-items: center; justify-content: center;
  padding: 60px 40px; cursor: pointer;
}
.fullscreen.open { display: flex; animation: fsin 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fsin { from{opacity:0; transform: scale(0.95)} to{opacity:1; transform: scale(1)} }
.fs-inner { max-width: 900px; text-align: center; pointer-events: none; }
.fs-mood {
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--red); margin-bottom: 40px; font-weight: 500;
}
.fs-text {
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  font-size: clamp(48px, 10vw, 120px);
  line-height: 1; color: var(--text); white-space: pre-line;
  text-transform: uppercase; letter-spacing: 0.02em;
}
.fs-close {
  position: absolute; top: 40px; right: 40px;
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text3); pointer-events: all; cursor: pointer;
  transition: color 0.15s;
}
.fs-close:hover { color: var(--text); }
.fs-actions {
  position: absolute; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 32px; pointer-events: all;
}
.fs-action-btn {
  background: none; border: none; cursor: pointer;
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--text3); font-family: 'Inter', sans-serif;
  transition: color 0.15s; padding: 0;
}
.fs-action-btn:hover { color: var(--text); }

/* FOOTER */
footer {
  border-top: 1px solid rgba(255,255,255,0.04);
  padding: 60px 8vw;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-logo { 
  font-family: 'Bebas Neue', sans-serif; 
  font-size: 24px; letter-spacing: .08em; color: var(--text); 
}
.footer-logo span { color: var(--red); }
.footer-txt { 
  font-size: 11px; color: var(--text3); 
  letter-spacing: .05em; line-height: 1.6; text-align: center; 
}
.footer-social { display: flex; gap: 24px; }
.footer-social-link { 
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase; 
  color: var(--text3); text-decoration: none; transition: color 0.15s; 
}
.footer-social-link:hover { color: var(--text); }

/* TOAST */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--red);
  color: var(--text); padding: 12px 28px;
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  font-weight: 500;
  z-index: 9000; pointer-events: none; white-space: nowrap;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 0; }

@media(max-width:768px) {
  nav { padding: 0 24px; height: 60px; }
  .hero { padding: 0 6vw; }
  .hero-title { font-size: clamp(56px, 18vw, 120px); line-height: 0.88; }
  .hero-meta { display: none; }
  .hero-scroll { bottom: 40px; right: 6vw; }
  .mood-bar { padding: 0 6vw; top: 60px; }
  .feed { padding: 60px 24px 100px; }
  .quote-block { padding: 60px 0; }
  .quote-block.size-featured { padding: 80px 0; }
  footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 6vw; }
}
</style>

];

const THOUGHTS = [
  {text:"some feelings don't have names. they just have 3am.",mood:'3am'},
  {text:"you can miss someone and still know the distance was right.",mood:'love'},
  {text:"rest isn't something you earn. it's something you take.",mood:'survive'},
  {text:"not everything needs a lesson. some things just hurt.",mood:'empty'},
  {text:"being understood is a privilege not everyone gets.",mood:'numb'},
  {text:"the people holding the most together are usually the quietest about it.",mood:'3am'},
  {text:"you're allowed to grieve things that were never officially yours.",mood:'heartbreak'},
  {text:"sometimes the most radical thing is just still being here.",mood:'survive'},
  {text:"you didn't fail. you survived something most people can't admit exists.",mood:'empty'},
  {text:"the silence after someone leaves is a different kind of loud.",mood:'love'},
];

let likedSet = new Set();
let fsText = '', fsMood = '';

function fmtNum(n) {
  return n >= 1000 ? (n/1000).toFixed(1).replace('.0','') + 'k' : String(n);
}

function buildFeed(mood) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  const quotes = mood === 'all' ? [...QUOTES] : QUOTES.filter(q => q.mood === mood);
  const thoughts = [...THOUGHTS].filter(t => mood === 'all' || t.mood === mood);
  let ti = 0;
  const ctaAt = Math.floor(quotes.length * 0.55);

  quotes.forEach((q, i) => {
    feed.appendChild(makeQuoteBlock(q));
    if ((i + 1) % 5 === 0 && ti < thoughts.length) {
      feed.appendChild(makeThoughtBlock(thoughts[ti++]));
    }
    if (i === ctaAt) feed.appendChild(makeCTA());
  });

  observeAll();
}

function makeQuoteBlock(q) {
  const el = document.createElement('div');
  const sizeClass = q.size ? ' size-' + q.size : '';
  el.className = 'quote-block' + sizeClass;
  const id = btoa(encodeURIComponent(q.text.substring(0,20))).replace(/=/g,'');
  const liked = likedSet.has(id);
  el.innerHTML = `
    <div class="qb-mood">${q.mood}</div>
    <div class="qb-text" onclick="openFS(this,'${id}')">${q.text}</div>
    <div class="qb-divider"></div>
    <div class="qb-meta">
      <div class="qb-actions">
        <button class="qb-like-btn${liked?' liked':''}" onclick="toggleLike(this,'${id}',${q.likes})">
          <span class="heart">${liked?'♥':'♡'}</span>
          <span class="lcount">${fmtNum(q.likes + (liked?1:0))}</span>
        </button>
      </div>
      <button class="qb-copy-btn" onclick="copyBlock(this)">copy</button>
    </div>
  `;
  el._text = q.text;
  el._mood = q.mood;
  return el;
}

function makeThoughtBlock(t) {
  const el = document.createElement('div');
  el.className = 'thought-block';
  el.innerHTML = `<div class="thought-text">${t.text}</div>`;
  return el;
}

function makeCTA() {
  const el = document.createElement('div');
  el.className = 'feed-cta';
  el.innerHTML = `
    <div class="feed-cta-eyebrow">outl1r editor</div>
    <div class="feed-cta-text">turn pain into content.<br>make reels that hit different.</div>
    <a class="feed-cta-link" href="#">start creating →</a>
  `;
  return el;
}

function observeAll() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('vis'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.quote-block, .thought-block, .feed-cta').forEach(el => obs.observe(el));
}

function filterMood(mood, btn) {
  document.querySelectorAll('.mb-item').forEach(x => x.classList.remove('on'));
  btn.classList.add('on');
  buildFeed(mood);
  document.getElementById('feed').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleLike(btn, id, base) {
  const was = likedSet.has(id);
  was ? likedSet.delete(id) : likedSet.add(id);
  const liked = likedSet.has(id);
  btn.classList.toggle('liked', liked);
  btn.querySelector('.heart').textContent = liked ? '♥' : '♡';
  btn.querySelector('.lcount').textContent = fmtNum(base + (liked ? 1 : 0));
}

function copyBlock(btn) {
  const text = btn.closest('.quote-block')._text;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied';
    setTimeout(() => btn.textContent = 'copy', 1800);
    showToast('copied to clipboard');
  });
}

function openFS(textEl, id) {
  const block = textEl.closest('.quote-block');
  fsText = block._text;
  fsMood = block._mood;
  document.getElementById('fsText').textContent = fsText;
  document.getElementById('fsMood').textContent = fsMood;
  document.getElementById('fs').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeFS() {
  document.getElementById('fs').classList.remove('open');
  document.body.style.overflow = '';
}
function copyFS() {
  navigator.clipboard.writeText(fsText).then(() => showToast('copied to clipboard'));
}
function shareFS() {
  if (navigator.share) {
    navigator.share({ text: fsText + '\n\n— outl1r.com' });
  } else {
    navigator.clipboard.writeText(fsText + '\n\n— outl1r.com').then(() => showToast('copied to share'));
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFS(); });

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('solid', window.scrollY > 60);
});

buildFeed('all');
</script>
</body>
</html>
